services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
    volumes:
      - game-data:/app/data

  frontend:
    build: ./frontend
    ports:
      - "8329:8329"
    depends_on:
      - backend

volumes:
  game-data:
