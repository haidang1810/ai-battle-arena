services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: npx tsx watch src/index.ts
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
    volumes:
      - ./backend/src:/app/src
      - game-data:/app/data

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "8329:8329"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  game-data:
